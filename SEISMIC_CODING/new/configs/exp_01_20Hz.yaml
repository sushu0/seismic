seed: 42
deterministic: true
device: cuda

data:
  data_root: data/01_20Hz
  norm:
    seismic: zscore
    impedance: zscore
    eps: 1e-6

model:
  name: unet1d
  base: 48
  depth: 5

physics:
  dt_s: 0.01          # 采样间隔 10ms (对应01_20Hz数据)
  wavelet_f0_hz: 20.0  # 20Hz主频
  wavelet_length_s: 0.128
  eps: 1e-6

train:
  epochs: 150
  batch_size: 16
  batch_size_eval: 32
  lr: 0.001
  weight_decay: 1e-4
  grad_clip: 5.0
  sup_loss: smoothl1
  use_unlabeled: false
  use_teacher: false
  lambda_phys: 0.0
  lambda_freq: 0.0
  lambda_cons: 0.0
  phys_loss_mode: mse
  stft_n_fft: 256
  stft_hop: 64
  stft_win: 256
  aug_noise: 0.01
  aug_amp: 0.05
  aug_shift: 5
  ema: 0.99

output:
  root: results
  exp_name: 01_20Hz_unet1d
  make_plots: true
