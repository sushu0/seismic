# Default config aligned with the paper's Marmousi2 synthetic experiment.
# Dataset and forward modeling: 30Hz, 0┬░ phase Ricker wavelet; 13601 traces, 2800 samples, dt=1ms ŅłĆfileciteŅłéturn2file0ŅłéL228-L245Ņłü
data:
  path: data/synth_marmousi_like.npz

train:
  seed: 42
  epochs: 50          # ŅłĆfileciteŅłéturn2file0ŅłéL263-L269Ņłü
  batch_size: 12      # ŅłĆfileciteŅłéturn2file0ŅłéL263-L265Ņłü
  lr: 0.001           # ŅłĆfileciteŅłéturn2file0ŅłéL268-L269Ņłü
  weight_decay: 1e-7  # ŅłĆfileciteŅłéturn2file0ŅłéL265-L267Ņłü
  run_dir: runs/exp1

model:
  last_relu: true  # paper uses ReLU activation.

eval:
  batch_size: 24
  snr_db_list: [35, 25, 15, 5]   # ŅłĆfileciteŅłéturn2file0ŅłéL318-L323Ņłü
  shallow_frac: 0.2              # shallow=1/5 ŅłĆfileciteŅłéturn2file0ŅłéL367-L383Ņłü
