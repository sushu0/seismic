seed: 42
deterministic: true
device: cuda
data:
  data_root: data/toy
  norm:
    seismic: zscore
    impedance: zscore
    eps: 1e-6
model:
  name: ms_physformer
  base: 48
  depth: 4
  nhead: 4
  tf_dim_mult: 2
  tf_layers: 2
physics:
  dt_s: 0.002
  wavelet_f0_hz: 30.0
  wavelet_length_s: 0.128
  eps: 1e-6
train:
  epochs: 20
  batch_size: 8
  batch_size_eval: 16
  lr: 0.001
  weight_decay: 1e-4
  grad_clip: 5.0
  sup_loss: smoothl1
  use_unlabeled: true
  use_teacher: true
  lambda_phys: 0.0
  lambda_freq: 0.3
  lambda_cons: 0.2
  phys_loss_mode: mse
  stft_n_fft: 256
  stft_hop: 64
  stft_win: 256
  aug_noise: 0.03
  aug_amp: 0.15
  aug_shift: 12
  ema: 0.99
output:
  root: results
  exp_name: abl_no_physics
  make_plots: true
